  build-windows:
    needs: [parse-commit]
    if: needs.parse-commit.outputs.should_release == 'true'
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION="$(awk -F'"' '
            /^\[workspace\.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-

      - name: Build
        run: cargo build --release -p JereIDE

      - name: Package zip
        shell: pwsh
        run: |
          $stage = "JereIDE-v${env:APP_VERSION}-Windows-Intel"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item target\release\JereIDE.exe "$stage\"
          Copy-Item LICENSE "$stage\"
          Copy-Item README.md "$stage\"
          Compress-Archive -Path "$stage\*" -DestinationPath "${stage}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: JereIDE-Windows-Intel
          path: |
            JereIDE-*-Windows-Intel.zip

  build-macos:
    needs: [parse-commit]
    if: needs.parse-commit.outputs.should_release == 'true'
    strategy:
      matrix:
        target:
          - label: macOS Apple Silicon (aarch64)
            rust-target: aarch64-apple-darwin
            arch: aarch64
            chip: AppleSilicon
          - label: macOS Intel (x86_64)
            rust-target: x86_64-apple-darwin
            arch: x86_64
            chip: Intel
    name: ${{ matrix.target.label }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Read app version
        shell: bash
        run: |
          APP_VERSION="$(awk -F'"' '
            /^\[workspace\.package\]$/ { in_section = 1; next }
            /^\[/ { in_section = 0 }
            in_section && $1 ~ /^version = / { print $2; exit }
          ' Cargo.toml)"
          echo "APP_VERSION=$APP_VERSION" >> "$GITHUB_ENV"

      - name: Install system dependencies
        run: |
          brew install cmake ninja

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target.rust-target }}

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ github.job }}-${{ matrix.target.arch }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ github.job }}-${{ matrix.target.arch }}-

      - name: Build
        env:
          MACOSX_DEPLOYMENT_TARGET: "12.0"
        run: |
          CLANG_RT=$(clang -arch ${{ matrix.target.arch == 'aarch64' && 'arm64' || 'x86_64' }} -print-file-name=libclang_rt.osx.a)
          export RUSTFLAGS="-C link-arg=$CLANG_RT \
            -C link-arg=-framework -C link-arg=UniformTypeIdentifiers"
          cargo build --release -p JereIDE --target ${{ matrix.target.rust-target }}

      - name: Package zip
        run: |
          ARCHIVE_BASE="JereIDE-v${APP_VERSION}-macOS-${{ matrix.target.chip }}"
          mkdir "$ARCHIVE_BASE"
          cp "target/${{ matrix.target.rust-target }}/release/JereIDE" "$ARCHIVE_BASE/"
          cp LICENSE "$ARCHIVE_BASE/"
          cp README.md "$ARCHIVE_BASE/"
          zip -r "${ARCHIVE_BASE}.zip" "$ARCHIVE_BASE"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: JereIDE-macOS-${{ matrix.target.chip }}
          path: JereIDE-*-macOS-${{ matrix.target.chip }}.zip

  release:
    name: Upload to Draft Release
    needs: [parse-commit, build-windows, build-macos]
    if: needs.parse-commit.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: artifacts/

      - name: Collect release files
        run: |
          find artifacts -mindepth 2 -maxdepth 2 -type f \
            \( -name '*.tar.gz' -o -name '*.zip' \) \
            -exec mv {} artifacts/ \;
          rm -rf artifacts/*/

      - name: Upload artifacts to draft release
        run: |
          gh release upload "${{ needs.parse-commit.outputs.release_tag }}" artifacts/* --clobber --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
