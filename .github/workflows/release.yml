name: Build Release Binaries

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix)"
        required: true
      title:
        description: "Release title"
        required: true

jobs:
  parse-commit:
    name: Parse commit for release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      should_release: ${{ steps.parse.outputs.should_release }}
      release_tag: ${{ steps.parse.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Parse release info from commit or workflow_dispatch
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TITLE="${{ github.event.inputs.title }}"
          else
            COMMIT_MSG="$(git log -1 --format=%s)"
            if [[ "$COMMIT_MSG" =~ ^\[RELEASE\ v([^#]+)#(.+)\]$ ]]; then
              VERSION="${BASH_REMATCH[1]}"
              TITLE="${BASH_REMATCH[2]}"
            else
              echo "commit message does not match [RELEASE v{version}#{title}]"
              echo "should_release=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"

          if git rev-parse "v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists, skipping tag creation"
          else
            git tag "v$VERSION"
            git push origin "v$VERSION"
          fi

          NOTES_FLAG=""
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            BODY="$(git log -1 --format=%b)"
            if [[ -n "$BODY" ]]; then
              {
                printf "## What's Changed\n%s" "$BODY"
              } > /tmp/release_notes.md
              NOTES_FLAG="--notes-file /tmp/release_notes.md"
            fi
          fi

          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists, skipping creation"
          else
            gh release create "v$VERSION" --title "v$VERSION: $TITLE" --draft $NOTES_FLAG
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

