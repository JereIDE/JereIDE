name: Build macOS App
on: [push, pull_request]

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            os: macos-latest
          - arch: x86_64
            os: macos-13 # Standard Intel runner
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install PySide6 nuitka zstandard ordered-set
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build with Nuitka
        run: |
          python3 -m nuitka --standalone \
            --macos-create-app-bundle \
            --enable-plugin=pyside6 \
            --noinclude-qt-plugins=senseless \
            --macos-target-arch=${{ matrix.arch }} \
            --include-qt-plugins=platforms,styles,iconengines,imageformats \
            --macos-app-name="JereIDE-${{ matrix.arch }}" \
            src/JereIDE.py

      - name: Compress App Bundle
        run: |
          # Nuitka creates the .app in the current directory or based on the file name
          # Using wildcard to catch the generated .app bundle
          zip -r JereIDE-${{ matrix.arch }}.zip *.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JereIDE-${{ matrix.arch }}
          path: JereIDE-${{ matrix.arch }}.zip
